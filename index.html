<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BackDoor | Private AI</title>
    
    <!-- External Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #FFD400;
            --primary-hover: #EBBF00;
            --bg-cream: #FDFCF7;
            --black: #000000;
            --white: #FFFFFF;
            --text-muted: #666666;
            --border: rgba(0, 0, 0, 0.1);
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.05);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-cream);
            color: var(--black);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
            background-image: 
                radial-gradient(circle at 2px 2px, rgba(0,0,0,0.03) 1px, transparent 0);
            background-size: 40px 40px;
            position: relative;
        }

        /* --- Background Watermark --- */
        .bg-watermark {
            position: fixed;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%) rotate(-5deg);
            font-size: 20vw;
            font-weight: 900;
            color: rgba(0, 0, 0, 0.03);
            text-transform: uppercase;
            letter-spacing: -0.05em;
            pointer-events: none;
            z-index: 0;
            white-space: nowrap;
            user-select: none;
        }

        /* --- Header --- */
        header {
            padding: 1.5rem 3rem;
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 100;
            background: rgba(253, 252, 247, 0.8);
            backdrop-filter: blur(10px);
        }

        .logo {
            font-size: 1.25rem;
            font-weight: 900;
            letter-spacing: -0.05em;
            text-transform: uppercase;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        .logo-box {
            width: 24px;
            height: 24px;
            background: var(--black);
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: center;
            color: var(--primary);
            font-size: 0.8rem;
        }

        nav {
            display: flex;
            gap: 2rem;
            font-size: 0.85rem;
            font-weight: 600;
            text-transform: uppercase;
        }

        nav a {
            text-decoration: none;
            color: var(--black);
            opacity: 0.5;
            transition: opacity 0.2s;
            cursor: pointer;
        }

        nav a:hover { opacity: 1; }

        /* --- Chat Main --- */
        .main-content {
            flex: 1;
            display: flex;
            flex-direction: column;
            max-width: 1000px;
            width: 100%;
            margin: 0 auto;
            position: relative;
            overflow: hidden;
            z-index: 1;
        }

        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 2rem;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            scroll-behavior: smooth;
            height: 0;
        }

        .chat-container::-webkit-scrollbar { width: 5px; }
        .chat-container::-webkit-scrollbar-thumb { background: rgba(0,0,0,0.1); border-radius: 10px; }

        /* --- Messages --- */
        .message {
            max-width: 80%;
            padding: 1.25rem 1.5rem;
            border-radius: 20px;
            font-size: 0.95rem;
            line-height: 1.6;
            animation: slideIn 0.4s cubic-bezier(0.16, 1, 0.3, 1);
            position: relative;
        }

        @keyframes slideIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .user {
            align-self: flex-end;
            background: var(--black);
            color: var(--white);
            border-bottom-right-radius: 4px;
        }

        .assistant {
            align-self: flex-start;
            background: var(--white);
            color: var(--black);
            border: 1px solid var(--border);
            box-shadow: var(--shadow);
            border-bottom-left-radius: 4px;
        }

        /* --- Code Blocks --- */
        .code-wrapper {
            background: #111;
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(255,255,255,0.1);
            margin: 1rem 0;
        }

        .code-header {
            padding: 0.6rem 1rem;
            background: rgba(255,255,255,0.05);
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 0.75rem;
            font-family: monospace;
            color: #888;
        }

        .copy-btn {
            background: var(--primary);
            color: var(--black);
            border: none;
            padding: 4px 10px;
            border-radius: 4px;
            font-weight: 700;
            cursor: pointer;
            font-size: 0.7rem;
            transition: transform 0.2s;
        }

        .copy-btn:hover { transform: scale(1.05); }

        /* --- Input Section --- */
        .input-wrapper {
            padding: 2rem 3rem 3rem;
        }

        .input-box {
            background: var(--white);
            border: 1px solid var(--border);
            border-radius: 100px;
            padding: 0.6rem 0.6rem 0.6rem 1.5rem;
            display: flex;
            align-items: center;
            box-shadow: var(--shadow);
            transition: border-color 0.2s;
        }

        .input-box:focus-within { border-color: var(--black); }

        input {
            flex: 1;
            border: none;
            background: transparent;
            outline: none;
            font-size: 1rem;
            font-weight: 500;
            color: var(--black);
        }

        #sendBtn {
            background: var(--primary);
            color: var(--black);
            width: 44px;
            height: 44px;
            border-radius: 50%;
            border: none;
            font-weight: 900;
            cursor: pointer;
            display: flex;
            align-items: center;
            justify-content: center;
            transition: all 0.2s;
        }

        #sendBtn:hover { transform: scale(1.1); background: var(--black); color: var(--primary); }


        /* Thinking indicator */
        .thinking { display: flex; gap: 4px; padding: 4px 0; }
        .dot { width: 8px; height: 8px; background: var(--primary); border-radius: 50%; animation: bounce 1.4s infinite ease-in-out; }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
    </style>
</head>

<body>
    <div class="bg-watermark">BACKDOOR</div>

    <header>
        <div class="logo">
            <div class="logo-box">B</div>
            BackDoor Assistant
        </div>
    </header>

    <div class="main-content">
        <div class="chat-container" id="chat"></div>

        <div class="input-wrapper">
            <form class="input-box" id="chatForm">
                <input id="input" placeholder="Initiate encrypted session..." autocomplete="off" />
                <button type="submit" id="sendBtn">
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                </button>
            </form>
        </div>
    </div>

    <script>
        // --- 1. Utilities ---
        async function copyToClipboard(text, btn) {
            try {
                await navigator.clipboard.writeText(text);
                const originalText = btn.innerHTML;
                btn.innerHTML = 'COPIED';
                setTimeout(() => btn.innerHTML = originalText, 2000);
            } catch (err) { console.error('Copy failed', err); }
        }


        // --- 2. Markdown & Render ---
        const renderer = new marked.Renderer();
        renderer.code = function(tokenOrCode, language) {
            const code = typeof tokenOrCode === 'object' ? tokenOrCode.text : tokenOrCode;
            const lang = typeof tokenOrCode === 'object' ? tokenOrCode.lang : language;
            const validLang = !!(lang && hljs.getLanguage(lang));
            const highlighted = validLang ? hljs.highlight(code, { language: lang }).value : code;
            const blockId = 'code-' + Math.random().toString(36).substr(2, 9);
            
            return `
                <div class="code-wrapper">
                    <div class="code-header">
                        <span>${lang || 'CODE'}</span>
                        <button class="copy-btn" onclick="copyCodeFromElement('${blockId}', this)">COPY</button>
                    </div>
                    <pre><code id="${blockId}" class="hljs ${lang}">${highlighted}</code></pre>
                </div>
            `;
        };

        marked.setOptions({ renderer, breaks: true, gfm: true });

        function extractText(chunk) {
            if (!chunk) return "";
            if (typeof chunk === "string") return chunk;
            try {
                return chunk.chunk || chunk.text || chunk.content || 
                       (chunk.candidates && chunk.candidates[0]?.content?.parts && chunk.candidates[0].content.parts[0]?.text) ||
                       (chunk.choices && chunk.choices[0]?.delta?.content) || "";
            } catch (e) { return ""; }
        }

        // --- 3. Chat Logic ---
        let conversationHistory = [];

        function copyCodeFromElement(id, btn) {
            copyToClipboard(document.getElementById(id).innerText, btn);
        }

        function appendMessage(role, content, isThinking = false) {
            const chat = document.getElementById("chat");
            const div = document.createElement("div");
            div.className = "message " + role;
            
            if (isThinking) {
                div.innerHTML = `<div class="thinking"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
            } else {
                div.innerHTML = role === 'assistant' ? marked.parse(content) : content;
            }
            
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
            return div;
        }

        async function sendMessage(event) {
            if (event) event.preventDefault();
            const input = document.getElementById("input");
            const message = input.value.trim();
            if (!message) return;

            input.value = "";
            input.disabled = true;
            appendMessage("user", message);
            const assistantDiv = appendMessage("assistant", "", true);

            conversationHistory.push({ role: "user", content: message });

            try {
                const response = await fetch("http://localhost:3000/api/ask", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        question: message,
                        conversation: conversationHistory.slice(-20)
                    })
                });

                assistantDiv.innerHTML = "";
                let fullReply = "";
                let streamBuffer = "";
                const reader = response.body.getReader();
                const decoder = new TextDecoder();

                while (true) {
                    const { value, done } = await reader.read();
                    if (done) break;
                    
                    streamBuffer += decoder.decode(value, { stream: true });
                    const lines = streamBuffer.split("\n\n");
                    streamBuffer = lines.pop();

                    for (const line of lines) {
                        if (line.startsWith("data: ")) {
                            try {
                                const data = JSON.parse(line.slice(6));
                                if (data.finalResponse) {
                                    fullReply = data.finalResponse;
                                } else {
                                    fullReply += extractText(data);
                                }
                                assistantDiv.innerHTML = marked.parse(fullReply);
                                chat.scrollTop = chat.scrollHeight;
                            } catch (e) {}
                        }
                    }
                }
                conversationHistory.push({ role: "assistant", content: fullReply });
            } catch (e) {
                assistantDiv.innerHTML = "Encryption link failed. Reconnect server.";
            } finally {
                input.disabled = false;
                input.focus();
            }
        }

        function clearChat() {
            document.getElementById('chat').innerHTML = '';
            conversationHistory = [];
        }

        document.getElementById('chatForm').addEventListener('submit', sendMessage);
        
        // Initial Greeting
        appendMessage('assistant', 'Secure session initiated. How can I assist you today?');
    </script>
</body>
</html>
