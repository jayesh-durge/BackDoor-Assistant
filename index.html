<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Findly AI | Assistant</title>
    
    <!-- External Libraries -->
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/styles/github-dark.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/highlight.js/11.9.0/highlight.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    
    <style>
        :root {
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --bg-dark: #0f172a;
            --bg-card: #1e293b;
            --text-main: #f8fafc;
            --text-muted: #94a3b8;
            --accent: #10b981;
            --glass: rgba(30, 41, 59, 0.7);
            --border: rgba(255, 255, 255, 0.1);
            --copy-bg: rgba(99, 102, 241, 0.1);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background: var(--bg-dark);
            color: var(--text-main);
            height: 100vh;
            display: flex;
            flex-direction: column;
            overflow: hidden;
        }

        /* Header */
        header {
            padding: 1rem 2rem;
            background: var(--glass);
            backdrop-filter: blur(12px);
            border-bottom: 1px solid var(--border);
            display: flex;
            align-items: center;
            justify-content: space-between;
            z-index: 10;
        }

        .logo {
            font-size: 1.5rem;
            font-weight: 800;
            background: linear-gradient(to right, #818cf8, #c084fc);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            letter-spacing: -0.025em;
        }

        /* Chat Area */
        .chat-container {
            flex: 1;
            overflow-y: auto;
            padding: 2rem;
            scroll-behavior: smooth;
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
        }

        .message {
            max-width: 90%;
            padding: 1.25rem;
            border-radius: 16px;
            position: relative;
            animation: fadeIn 0.3s ease-out;
            line-height: 1.6;
            font-size: 0.95rem;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .user {
            align-self: flex-end;
            background: var(--primary);
            color: white;
            border-bottom-right-radius: 4px;
        }

        .assistant {
            align-self: flex-start;
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-bottom-left-radius: 4px;
            min-width: 200px;
        }

        /* Copyable Block System Styles */
        .copyable-block {
            background: var(--copy-bg);
            border: 1px solid rgba(99, 102, 241, 0.3);
            border-radius: 12px;
            margin: 1rem 0;
            overflow: hidden;
            transition: transform 0.2s;
        }

        .copyable-block:hover {
            transform: translateY(-2px);
            border-color: var(--primary);
        }

        .block-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.5rem 1rem;
            background: rgba(99, 102, 241, 0.15);
            font-weight: 600;
            font-size: 0.8rem;
            color: var(--text-main);
            border-bottom: 1px solid rgba(99, 102, 241, 0.2);
        }

        .block-content {
            padding: 1rem;
            font-size: 0.9rem;
        }

        .copy-btn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 4px 12px;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.75rem;
            font-weight: 700;
            transition: all 0.2s;
            display: flex;
            align-items: center;
            gap: 4px;
        }

        .copy-btn:hover {
            background: var(--primary-hover);
            transform: scale(1.05);
        }

        .copy-btn.feedback {
            background: var(--accent);
        }

        /* Code Block Enhancement */
        .code-wrapper {
            margin: 1rem 0;
            border-radius: 12px;
            overflow: hidden;
            background: #0d1117;
            border: 1px solid var(--border);
        }

        .code-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 0.5rem 1rem;
            background: rgba(255, 255, 255, 0.05);
            font-family: monospace;
            font-size: 0.75rem;
            color: var(--text-muted);
            border-bottom: 1px solid var(--border);
        }

        pre { margin: 0 !important; padding: 1rem !important; background: transparent !important; }
        code { font-family: 'Fira Code', monospace; }

        /* Assistant Actions */
        .assistant-actions {
            margin-top: 1rem;
            padding-top: 1rem;
            border-top: 1px solid var(--border);
            display: flex;
            gap: 10px;
        }

        .action-btn {
            background: transparent;
            border: 1px solid var(--border);
            color: var(--text-muted);
            padding: 6px 12px;
            border-radius: 6px;
            font-size: 0.75rem;
            cursor: pointer;
            transition: all 0.2s;
        }

        .action-btn:hover {
            background: rgba(255, 255, 255, 0.05);
            color: var(--text-main);
            border-color: var(--text-muted);
        }

        /* Input Bar */
        .input-wrapper {
            padding: 1.5rem 2rem;
            background: var(--bg-dark);
            border-top: 1px solid var(--border);
        }

        .input-container {
            max-width: 900px;
            margin: 0 auto;
            display: flex;
            gap: 0.75rem;
            background: var(--bg-card);
            padding: 0.5rem;
            border-radius: 12px;
            border: 1px solid var(--border);
        }

        input {
            flex: 1;
            padding: 0.75rem 1rem;
            background: transparent;
            border: none;
            color: var(--text-main);
            outline: none;
            font-size: 1rem;
        }

        #sendBtn {
            background: var(--primary);
            color: white;
            border: none;
            padding: 0.75rem 1.5rem;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
        }

        /* Thinking Animation */
        .thinking { display: flex; gap: 4px; padding: 4px 0; }
        .dot { width: 8px; height: 8px; background: var(--text-muted); border-radius: 50%; animation: bounce 1.4s infinite ease-in-out; }
        .dot:nth-child(2) { animation-delay: 0.2s; }
        .dot:nth-child(3) { animation-delay: 0.4s; }
        @keyframes bounce { 0%, 80%, 100% { transform: scale(0); } 40% { transform: scale(1); } }
    </style>
</head>

<body>

    <header>
        <div class="logo">Findly AI</div>
        <button onclick="clearChat()" id="clearBtn" style="background:transparent; border:1px solid var(--border); color:var(--text-muted); padding:6px 12px; border-radius:6px; cursor:pointer;">Clear Chat</button>
    </header>

    <div class="chat-container" id="chat"></div>

    <div class="input-wrapper">
        <form class="input-container" id="chatForm">
            <input id="input" placeholder="Ask anything..." autocomplete="off" />
            <button type="submit" id="sendBtn">Send</button>
        </form>
    </div>

    <script>
        // --- 1. Clipboard Utility ---
        async function copyToClipboard(text, btn) {
            try {
                if (navigator.clipboard && window.isSecureContext) {
                    await navigator.clipboard.writeText(text);
                } else {
                    const textArea = document.createElement("textarea");
                    textArea.value = text;
                    document.body.appendChild(textArea);
                    textArea.select();
                    document.execCommand('copy');
                    document.body.removeChild(textArea);
                }
                
                const originalText = btn.innerHTML;
                btn.innerHTML = '✓ Copied!';
                btn.classList.add('feedback');
                setTimeout(() => {
                    btn.innerHTML = originalText;
                    btn.classList.remove('feedback');
                }, 2000);
            } catch (err) {
                console.error('Copy failed', err);
            }
        }

        // --- 2. Markdown & Extraction Logic ---
        const renderer = new marked.Renderer();

        // Safe Text Extraction (Handles OpenAI, Gemini, and custom formats)
        function extractText(chunk) {
            if (!chunk) return "";
            if (typeof chunk === "string") return chunk;

            // Priority: Extract ONLY user-visible content
            return (
                chunk.chunk || 
                chunk.text || 
                chunk.content || 
                (chunk.candidates && chunk.candidates[0]?.content?.parts && chunk.candidates[0].content.parts[0]?.text) ||
                (chunk.choices && chunk.choices[0]?.delta?.content) ||
                "" // Fallback to empty string for internal fields like 'trace' or 'plan'
            );
        }

        // Custom Code Block Renderer
        renderer.code = function(tokenOrCode, language) {
            const code = typeof tokenOrCode === 'object' ? tokenOrCode.text : tokenOrCode;
            const lang = typeof tokenOrCode === 'object' ? tokenOrCode.lang : language;
            
            const validLang = !!(lang && hljs.getLanguage(lang));
            const highlighted = validLang ? hljs.highlight(code, { language: lang }).value : code;
            const blockId = 'code-' + Math.random().toString(36).substr(2, 9);
            
            return `
                <div class="code-wrapper">
                    <div class="code-header">
                        <span>${lang || 'code'}</span>
                        <button class="copy-btn" onclick="copyCodeFromElement('${blockId}', this)">Copy</button>
                    </div>
                    <pre><code id="${blockId}" class="hljs ${lang}">${highlighted}</code></pre>
                </div>
            `;
        };

        marked.setOptions({ renderer, breaks: true, gfm: true });

        // --- 3. Chat State & Streaming ---
        let conversationHistory = [];

        function copyCodeFromElement(id, btn) {
            const el = document.getElementById(id);
            copyToClipboard(el.innerText, btn);
        }

        function copyAllMessage(btn) {
            const messageDiv = btn.closest('.assistant');
            const clone = messageDiv.cloneNode(true);
            const actions = clone.querySelector('.assistant-actions');
            if (actions) actions.remove();
            copyToClipboard(clone.innerText.trim(), btn);
        }

        function appendMessage(role, content, isThinking = false) {
            const chat = document.getElementById("chat");
            const div = document.createElement("div");
            div.className = "message " + role;
            
            if (isThinking) {
                div.innerHTML = `<div class="thinking"><div class="dot"></div><div class="dot"></div><div class="dot"></div></div>`;
            } else {
                updateMessageDisplay(div, content, role);
            }
            
            chat.appendChild(div);
            chat.scrollTop = chat.scrollHeight;
            return div;
        }

        function updateMessageDisplay(container, content, role) {
            if (role === 'user') {
                container.textContent = content;
                return;
            }

            // Safe Markdown Render
            container.innerHTML = marked.parse(content);

            // Add "Copy All" footer
            if (!container.querySelector('.assistant-actions')) {
                const actions = document.createElement('div');
                actions.className = 'assistant-actions';
                actions.innerHTML = `<button class="action-btn" onclick="copyAllMessage(this)">Copy All Response</button>`;
                container.appendChild(actions);
            }
        }

        async function sendMessage(event) {
            if (event) event.preventDefault();
            const input = document.getElementById("input");
            const message = input.value.trim();
            if (!message) return;

            input.value = "";
            input.disabled = true;
            appendMessage("user", message);
            const assistantDiv = appendMessage("assistant", "", true);

            conversationHistory.push({ role: "user", content: message });

            try {
                const response = await fetch("http://localhost:3000/api/ask", {
                    method: "POST",
                    headers: { "Content-Type": "application/json" },
                    body: JSON.stringify({
                        question: message,
                        conversation: conversationHistory.slice(-20)
                    })
                });

                assistantDiv.innerHTML = "";
                let fullReply = "";
                let streamBuffer = "";

                const reader = response.body.getReader();
                const decoder = new TextDecoder();

                while (true) {
                    const { value, done } = await reader.read();
                    if (done) break;
                    
                    streamBuffer += decoder.decode(value, { stream: true });
                    const lines = streamBuffer.split("\n\n");
                    streamBuffer = lines.pop();

                    for (const line of lines) {
                        if (line.startsWith("data: ")) {
                            try {
                                const data = JSON.parse(line.slice(6));
                                
                                // 1. If it's a final response, it's the complete text
                                if (data.finalResponse) {
                                    fullReply = data.finalResponse;
                                    updateMessageDisplay(assistantDiv, fullReply, 'assistant');
                                } 
                                // 2. Otherwise, treat as an incremental chunk
                                else {
                                    const textChunk = extractText(data);
                                    if (textChunk) {
                                        fullReply += textChunk;
                                        updateMessageDisplay(assistantDiv, fullReply, 'assistant');
                                        document.getElementById("chat").scrollTop = document.getElementById("chat").scrollHeight;
                                    }
                                }
                            } catch (e) {
                                console.error("Parse error in stream", e);
                            }
                        }
                    }
                }
                conversationHistory.push({ role: "assistant", content: fullReply });
            } catch (e) {
                assistantDiv.innerHTML = "Network error. Is the server running?";
            } finally {
                input.disabled = false;
                input.focus();
            }
        }

        function clearChat() {
            document.getElementById('chat').innerHTML = '';
            conversationHistory = [];
        }

        document.getElementById('chatForm').addEventListener('submit', sendMessage);
        
        // Initial welcome
        appendMessage('assistant', 'System Online. Streaming pipeline secured. How can I assist you?');
    </script>

</body>
</html>
